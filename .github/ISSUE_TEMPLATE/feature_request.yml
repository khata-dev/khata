name: Feature request
description: Propose something new.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user journey or the missing capability. Concrete beats abstract.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like khata to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this, and why they fall short.

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Links, screenshots, references.
