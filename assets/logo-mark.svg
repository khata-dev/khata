<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="24" fill="#0f172a"/>
  <!-- Bearish (hollow) candle -->
  <line x1="40" y1="28" x2="40" y2="92" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <rect x="31" y="44" width="18" height="32" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <!-- Bullish (filled) candle -->
  <line x1="80" y1="20" x2="80" y2="100" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <rect x="71" y="34" width="18" height="44" fill="#fbbf24"/>
</svg>
